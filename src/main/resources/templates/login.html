<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gestión de Productos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="login-body">
<div class="browser-shell auth-shell">
    <div class="browser-top">
        <div class="browser-dots">
            <span></span><span></span><span></span>
        </div>
        <div class="browser-title">Sistema de gestión de subproductos</div>
    </div>
    <div class="browser-url">http://localhost:8080/login</div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Iniciar sesión</h1>
            <p class="auth-subtitle">Acceso al módulo Gestión de Producto</p>

            <div class="alert error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="field-group">
                    <label for="username">Usuario</label>
                    <input id="username" name="username" type="text" placeholder="admin" required />
                </div>

                <div class="field-group">
                    <label for="password">Contraseña</label>
                    <input id="password" name="password" type="password" placeholder="********" required />
                </div>

                <div class="demo-box">
                    Usuario demo: <strong>admin</strong><br>
                    Contraseña demo: <strong>admin123</strong>
                </div>

                <button type="submit" class="primary-btn full-btn">Entrar</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
