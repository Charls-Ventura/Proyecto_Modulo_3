<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarifas de Produccion</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content-panel">
        <div class="content-header">
            <div>
                <h1>Tarifas de Produccion</h1>
                <p class="page-caption">Configura la tarifa vigente de cada producto</p>
            </div>
            <a class="secondary-btn" th:href="@{/productos}">Volver a productos</a>
        </div>

        <div class="table-wrapper">
            <div class="table-head grid-tarifas">
                <span>Codigo</span>
                <span>Nombre</span>
                <span>Tipo</span>
                <span>Tarifa actual</span>
                <span>Accion</span>
            </div>

            <div class="product-row grid-tarifas" th:each="producto : ${productos}">
                <div><strong th:text="${producto.codigoSku}"></strong></div>
                <div><strong th:text="${producto.nombre}"></strong></div>
                <div><span class="badge neutral-badge" th:text="${producto.tipo}"></span></div>
                <div><strong th:text="${tarifasActuales[producto.id] != null ? 'RD$ ' + tarifasActuales[producto.id] : 'Sin tarifa'}"></strong></div>
                <div class="actions-cell">
                    <a class="icon-btn blue-btn" th:href="@{/tarifas-produccion/producto/{id}/cambiar(id=${producto.id})}">Cambiar tarifa</a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
