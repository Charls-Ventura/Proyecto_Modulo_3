<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cambiar Tarifa</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content-panel">
        <div class="content-header form-header">
            <div>
                <h1>Cambiar Tarifa</h1>
                <p class="page-caption">
                    Producto: <strong th:text="${producto.nombre}"></strong>
                    <span th:text="${'(' + producto.codigoSku + ')'}"></span>
                </p>
            </div>
            <a class="secondary-btn" th:href="@{/productos}">Volver al listado</a>
        </div>

        <div class="info-card" th:if="${tarifaActual != null}">
            <span class="info-label">Tarifa actual</span>
            <strong th:text="${'RD$ ' + tarifaActual.monto}"></strong>
        </div>

        <form class="product-form compact-form" th:action="@{/tarifas-produccion/producto/{id}/cambiar(id=${producto.id})}" th:object="${tarifaForm}" method="post">
            <div class="form-grid form-grid-simple">
                <div class="field-group">
                    <label for="monto">Nueva tarifa de produccion</label>
                    <input id="monto" type="number" step="0.01" min="0" th:field="*{monto}" placeholder="0.00" />
                    <small class="field-error" th:errors="*{monto}"></small>
                </div>
                <div class="field-group full-width">
                    <label for="observacion">Observacion</label>
                    <textarea id="observacion" th:field="*{observacion}" rows="3" placeholder="Motivo del cambio de tarifa"></textarea>
                    <small class="field-error" th:errors="*{observacion}"></small>
                </div>
            </div>
            <div class="form-actions">
                <a class="cancel-btn" th:href="@{/productos}">Cancelar</a>
                <button type="submit" class="primary-btn">Guardar cambio</button>
            </div>
        </form>
    </main>
</div>
</body>
</html>
