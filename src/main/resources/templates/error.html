<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body class="login-body">
<div class="browser-shell auth-shell">
    <div class="browser-top">
        <div class="browser-dots">
            <span></span><span></span><span></span>
        </div>
        <div class="browser-title">Sistema de gestión de subproductos</div>
    </div>
    <div class="browser-url">http://localhost:8080</div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Ocurrió un error</h1>
            <p class="auth-subtitle">No se pudo completar la operación solicitada.</p>
            <a class="primary-btn full-btn centered-link" th:href="@{/productos}">Volver a productos</a>
        </div>
    </div>
</div>
</body>
</html>
